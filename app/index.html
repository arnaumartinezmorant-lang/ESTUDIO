<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tests de Redes · Estudio por temas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>🖧 Tests de Redes</h1>
    <p class="subtitle">Planificación y administración de redes · Preguntas tipo test por tema</p>
  </header>

  <main id="app">
    <!-- Pantalla de inicio: selección de tema -->
    <section id="home" class="screen active">
      <h2>Elige un tema</h2>
      <div id="temaList" class="tema-grid"></div>

      <div class="options-panel">
        <h3>Opciones del test</h3>
        <label class="opt">
          <input type="checkbox" id="optShuffle" checked />
          Barajar el orden de las preguntas
        </label>
        <label class="opt">
          <input type="checkbox" id="optShuffleOpts" checked />
          Barajar el orden de las respuestas
        </label>
        <label class="opt">
          <input type="checkbox" id="optInstant" checked />
          Mostrar si acierto o fallo al instante
        </label>
        <label class="opt">
          Número de preguntas:
          <select id="optCount">
            <option value="0">Todas</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="50">50</option>
          </select>
        </label>
      </div>
    </section>

    <!-- Pantalla del test -->
    <section id="quiz" class="screen">
      <div class="quiz-head">
        <button id="btnExit" class="btn-ghost">← Salir</button>
        <span id="quizTitle" class="quiz-title"></span>
        <span id="progress" class="progress"></span>
      </div>
      <div class="progress-bar"><div id="progressFill"></div></div>

      <div id="questionBox" class="question-box"></div>

      <div class="quiz-foot">
        <span id="scoreLive" class="score-live"></span>
        <button id="btnNext" class="btn-primary" disabled>Siguiente →</button>
      </div>
    </section>

    <!-- Pantalla de resultados -->
    <section id="result" class="screen">
      <h2>Resultado</h2>
      <div id="scoreCircle" class="score-circle"><span id="scorePct">0%</span></div>
      <p id="scoreText" class="score-text"></p>
      <div id="reviewList" class="review-list"></div>
      <div class="result-actions">
        <button id="btnRetry" class="btn-primary">Repetir test</button>
        <button id="btnRetryFails" class="btn-secondary">Repasar solo fallos</button>
        <button id="btnHome" class="btn-ghost">Volver al inicio</button>
      </div>
    </section>

    <!-- Pantalla FLASHCARDS -->
    <section id="flashcards" class="screen">
      <div class="quiz-head">
        <button id="btnFlashExit" class="btn-ghost">← Salir</button>
        <span id="flashTitle" class="quiz-title"></span>
        <span id="flashProgress" class="progress"></span>
      </div>
      <div id="flashCard" class="flash-card">
        <div class="flash-inner">
          <div class="flash-face flash-front"><span id="flashFront"></span></div>
          <div class="flash-face flash-back"><span id="flashBack"></span></div>
        </div>
      </div>
      <p id="flashHint" class="flash-hint"></p>
      <div class="quiz-foot">
        <button id="btnFlashPrev" class="btn-secondary">← Anterior</button>
        <button id="btnFlashNext" class="btn-primary">Siguiente →</button>
      </div>
    </section>

    <!-- Pantalla RELACIONAR (matching) -->
    <section id="matching" class="screen">
      <div class="quiz-head">
        <button id="btnMatchExit" class="btn-ghost">← Salir</button>
        <span id="matchTitle" class="quiz-title"></span>
        <span id="matchProgress" class="progress"></span>
      </div>
      <p class="match-instr">Selecciona un concepto de la izquierda y luego su pareja de la derecha.</p>
      <div id="matchMsg" class="match-msg"></div>
      <div class="match-cols">
        <div id="matchLeft" class="match-col"></div>
        <div id="matchRight" class="match-col"></div>
      </div>
    </section>

    <!-- Pantalla RESUMEN -->
    <section id="resumen" class="screen">
      <div class="quiz-head">
        <button id="btnResumenExit" class="btn-ghost">← Salir</button>
        <span id="resumenTitle" class="quiz-title"></span>
        <span class="progress"></span>
      </div>
      <article id="resumenBody" class="resumen-body"></article>
      <div class="result-actions">
        <button id="btnResumenExit2" class="btn-ghost" onclick="document.getElementById('btnResumenExit').click()">Volver al inicio</button>
      </div>
    </section>

    <!-- Pantalla COMPLETAR (cloze) -->
    <section id="huecos" class="screen">
      <div class="quiz-head">
        <button id="btnHuecosExit" class="btn-ghost">← Salir</button>
        <span id="huecosTitle" class="quiz-title"></span>
        <span id="huecosProgress" class="progress"></span>
      </div>
      <div id="huecosBox" class="cloze-box"></div>
      <div class="quiz-foot">
        <span id="huecosScore" class="score-live"></span>
        <button id="btnHuecosNext" class="btn-primary" disabled>Siguiente →</button>
      </div>
    </section>

    <!-- Pantalla VERDADERO / FALSO -->
    <section id="vf" class="screen">
      <div class="quiz-head">
        <button id="btnVfExit" class="btn-ghost">← Salir</button>
        <span id="vfTitle" class="quiz-title"></span>
        <span id="vfProgress" class="progress"></span>
      </div>
      <div class="question-box">
        <p id="vfStatement" class="q-text"></p>
        <div class="vf-buttons">
          <button id="btnVerdadero" class="btn-vf vf-true">✔️ Verdadero</button>
          <button id="btnFalso" class="btn-vf vf-false">✖️ Falso</button>
        </div>
        <div id="vfExp" class="explanation"></div>
      </div>
      <div class="quiz-foot">
        <span id="vfScore" class="score-live"></span>
        <button id="btnVfNext" class="btn-primary" disabled>Siguiente →</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Contenido basado en los temas 1–5 del módulo. Material de autoestudio.</p>
  </footer>

  <!-- Datos de los temas -->
  <script src="data/tema01.js"></script>
  <script src="data/tema01_extra.js"></script>
  <script src="data/tema02.js"></script>
  <script src="data/tema02_extra.js"></script>
  <script src="data/tema02_organismos.js"></script>
  <script src="data/tema02_organismos_extra.js"></script>
  <script src="data/tema03.js"></script>
  <script src="data/tema03_extra.js"></script>
  <script src="data/tema04.js"></script>
  <script src="data/tema04_extra.js"></script>
  <script src="data/tema05.js"></script>
  <script src="data/tema05_extra.js"></script>
  <script src="data/tema06.js"></script>
  <!-- Repaso (flashcards, relacionar, verdadero/falso) -->
  <script src="data/repaso.js"></script>
  <script src="data/repaso_extra.js"></script>
  <!-- Resúmenes visuales -->
  <script src="data/resumenes.js"></script>
  <script src="data/resumenes_extra.js"></script>
  <!-- Lógica -->
  <script src="app.js"></script>
</body>
</html>
